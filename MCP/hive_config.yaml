# ─────────────────────────────────────────────────────────────────────────────
#  Hive Execution Layer — Infrastructure Config
#  All values here are overridable via environment variables in .env
# ─────────────────────────────────────────────────────────────────────────────

hive:
  host: dl-dev-cl-mn02.datalake-dev.local
  port: 10000
  auth: KERBEROS
  kerberos_service_name: hive
  database: curated_datamodels        # default database for SHOW TABLES etc.

hadoop:
  home: /usr/local/hadoop-3.3.6
  conf_dir: ~/hadoop-configuration    # must contain core-site.xml, hdfs-site.xml

execution:
  query_timeout_seconds: 300

  # ── Session settings (applied once per Hive connection) ─────────────────────
  #
  # CDP/Cloudera Iceberg vectorized reader incompatibility
  # ──────────────────────────────────────────────────────
  # The CDP cluster contains a runtime incompatibility in the Iceberg vectorized
  # reader path that manifests as:
  #
  #   java.lang.NoSuchMethodError:
  #       org.apache.iceberg.parquet.ParquetSchemaUtil.hasIds(
  #           org.apache.parquet.schema.MessageType)
  #
  # Root cause: version skew between the cluster's Iceberg JAR and Parquet JAR
  # in the vectorized code path.  This is a cluster-side issue that cannot be
  # fixed from the client.
  #
  # Workaround: disable Hive vectorized execution for this session.
  # HiveExecutor sends every statement below immediately after connection
  # establishment (and after every automatic reconnect).
  #
  # Add additional session-scoped SET statements here as needed — no code
  # changes required.
  session_settings:
    - "SET hive.vectorized.execution.enabled=false"

  # ── KeyError 22 workaround ──────────────────────────────────────────────────
  # PyHive cannot process Hive's internal type code 22 (timestamptz).
  # Any column listed here will have its fetched value cast to str in Python
  # AFTER the query returns — transparent to the LLM and users.
  # Add new column names here if more timestamptz columns are discovered.
  timestamptz_columns:
    - created_date
    - updated_date

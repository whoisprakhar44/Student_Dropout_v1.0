database: curated_datamodels
table: school_academic_performance_fact
description: Fact table for school academic performance measures and events.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_academic_performance_fact/
partitioned_by: bucket(32, school_academic_performance_fact_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.school_academic_performance_fact\n\
  (\n    school_academic_performance_fact_id_pk   BIGINT,\n    citizen_student_id_fk\
  \                    BIGINT,\n    citizen_school_id_fk                     BIGINT,\n\
  \    student_subject_id_fk                    BIGINT,\n    exam_date_key_id_fk \
  \                     BIGINT,\n    student_class_dim_id_fk                  BIGINT,\n\
  \    assessment_dim_id_fk                     BIGINT,\n    school_medium_id_fk \
  \                     BIGINT,\n    academic_year                            STRING,\n\
  \    student_exam_id_fk                       BIGINT,\n    student_roll_number \
  \                     STRING,\n    exam_registration_number                 STRING,\n\
  \    hall_ticket_number                       STRING,\n    assessment_cycle    \
  \                     STRING,\n    marks_obtained                           DECIMAL(5,2),\n\
  \    maximum_marks                            DECIMAL(5,2),\n    percentage_score\
  \                         DECIMAL(5,2),\n    pass_flag                         \
  \       STRING,\n    fail_flag                                STRING,\n    absent_flag\
  \                              STRING,\n    withheld_flag                      \
  \      STRING,\n    grade_point                              DECIMAL(4,2),\n   \
  \ exam_type                                STRING,\n    evaluation_type        \
  \                  STRING,\n    medium_of_exam                           STRING,\n\
  \    instruction_language                     STRING,\n    score               \
  \                     DECIMAL(5,2),\n    performance_band                      \
  \   STRING,\n    year_on_year_improvement_flag            STRING,\n    created_date\
  \                             TIMESTAMP,\n    created_by                       \
  \        STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, school_academic_performance_fact_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_academic_performance_fact/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

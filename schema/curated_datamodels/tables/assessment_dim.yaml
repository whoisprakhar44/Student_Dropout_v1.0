database: curated_datamodels
table: assessment_dim
description: Dimension/master table for assessment reference attributes.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/school/assessment_dim/
partitioned_by: bucket(32, assessment_dim_id_pk)

  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.assessment_dim\n\
  (\n    assessment_dim_id_pk      BIGINT,\n    assessment_code           STRING,\n\
  \    assessment_type           STRING,\n    assessment_name           STRING,\n\
  \    board_code                STRING,\n    grade_scheme              STRING,\n\
  \    is_summative              STRING,\n    is_active                 STRING,\n\
  \    effective_start_date      DATE,\n    effective_end_date        DATE,\n    is_current\
  \                STRING,\n    created_date              TIMESTAMP,\n    created_by\
  \                STRING,\n    updated_date              TIMESTAMP,\n    updated_by\
  \                STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, assessment_dim_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/assessment_dim/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

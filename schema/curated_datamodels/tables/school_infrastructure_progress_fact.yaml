partitioned_by: bucket(32, school_infrastructure_progress_fact_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.school_infrastructure_progress_fact\n\
  (\n    school_infrastructure_progress_fact_id_pk   BIGINT,\n    citizen_school_id_pk\
  \                         BIGINT,\n    reporting_date_key_fk                   \
  \     BIGINT,\n    infrastructure_component_id_fk               BIGINT,\n    infrastructure_category_id_fk\
  \                BIGINT,\n    reporting_period_id_fk                       BIGINT,\n\
  \    academic_year                                STRING,\n    scheme_id_fk    \
  \                             BIGINT,\n    work_order_no                       \
  \         STRING,\n    estimate_id                                  STRING,\n  \
  \  total_units                                  INT,\n    functional_units     \
  \                        INT,\n    non_functional_units                        \
  \ INT,\n    under_construction_units                     INT,\n    planned_unit_count\
  \                           INT,\n    completed_unit_count                     \
  \    INT,\n    in_progress_unit_count                       INT,\n    pending_unit_count\
  \                           INT,\n    physical_progress_percentage             \
  \    DECIMAL(5,2),\n    financial_progress_percentage                DECIMAL(5,2),\n\
  \    estimated_cost_amount                        DECIMAL(12,2),\n    sanctioned_amount\
  \                            DECIMAL(12,2),\n    released_amount               \
  \               DECIMAL(12,2),\n    utilized_amount                            \
  \  DECIMAL(12,2),\n    balance_amount                               DECIMAL(12,2),\n\
  \    work_status                                  STRING,\n    start_date      \
  \                             DATE,\n    expected_completion_date              \
  \       DATE,\n    actual_completion_date                       DATE,\n    delay_days\
  \                                   INT,\n    delay_reason_code                \
  \            STRING,\n    school_infrastructure_progress_factcol2      STRING,\n\
  \    is_structurally_certified_flag               STRING,\n    is_safety_compliant_flag\
  \                     STRING,\n    is_functional_flag                          \
  \ STRING,\n    maintenance_required_flag                    STRING,\n    geo_tagged_flag\
  \                              STRING,\n    geo_latitude                       \
  \          DECIMAL(9,6),\n    geo_longitude                                DECIMAL(9,6),\n\
  \    last_inspection_date                         DATE,\n    inspection_score  \
  \                           DECIMAL(5,2),\n    inspection_remarks_code         \
  \             STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, school_infrastructure_progress_fact_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_infrastructure_progress_fact/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

database: curated_datamodels
table: school_teacher_attendance_fact
description: Fact table for school teacher attendance measures and events.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_teacher_attendance_fact/
partitioned_by: bucket(32, school_teacher_attendance_fact_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.school_teacher_attendance_fact\n\
  (\n    school_teacher_attendance_fact_id_pk   BIGINT,\n    citizen_school_teacher_id_fk\
  \            BIGINT,\n    citizen_student_id_fk                   BIGINT,\n    attendance_date_key_id_fk\
  \               BIGINT,\n    academic_year                           STRING,\n \
  \   present_flag                            STRING,\n    attendance_count      \
  \                  INT,\n    on_leave_flag                           STRING,\n \
  \   on_duty_flag                            STRING,\n    late_flag             \
  \                  STRING,\n    leave_type                              STRING,\n\
  \    approved_leave_flag                     STRING,\n    attendance_source    \
  \                   STRING,\n    capture_timestamp                       TIMESTAMP,\n\
  \    attendance_status_code                  STRING,\n    capture_source       \
  \                   STRING,\n    image_available_flag                   STRING,\n\
  \    approval_status_code                   STRING,\n    approval_role         \
  \                  STRING,\n    approval_timestamp                      TIMESTAMP,\n\
  \    created_date                            TIMESTAMP,\n    created_by        \
  \                      STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, school_teacher_attendance_fact_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_teacher_attendance_fact/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

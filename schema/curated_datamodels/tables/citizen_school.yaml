database: curated_datamodels
table: citizen_school
description: Curated table containing citizen school attributes.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_school/
partitioned_by: bucket(32, citizen_school_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.citizen_school\n\
  (\n    citizen_school_id_pk           BIGINT,\n    school_medium_id_fk         \
  \   BIGINT,\n    school_teacher_id_fk           BIGINT,\n    school_category_id_fk\
  \          BIGINT,\n    school_management_id_fk        BIGINT,\n    school_dept_code\
  \               STRING,\n    school_udise_code              STRING,\n    school_name\
  \                    STRING,\n    school_address                 STRING,\n    district_name\
  \                  STRING,\n    district_lgd_code              STRING,\n    mandal_name\
  \                    STRING,\n    mandal_lgd_code                STRING,\n    village_name\
  \                   STRING,\n    village_lgd_code               STRING,\n    urban_rural_flag\
  \               STRING,\n    latitude                       DECIMAL(9,6),\n    longitude\
  \                      DECIMAL(9,6),\n    school_pincode                 STRING,\n\
  \    functional_status              STRING,\n    academic_year_opened          \
  \ STRING,\n    min_class                      INT,\n    max_class              \
  \        INT,\n    pre_primary_flag               STRING,\n    vocational_flag \
  \               STRING,\n    building_status                STRING,\n    electricity_availability_flag\
  \  STRING,\n    drinking_water_availability_flag STRING,\n    toilet_boys_flag \
  \              STRING,\n    toilet_girls_flag              STRING,\n    ict_enabled_flag\
  \               STRING,\n    playground_flag                STRING,\n    head_master_name\
  \               STRING,\n    head_master_mobile             STRING,\n    school_contact_no\
  \              STRING,\n    school_email_id                STRING,\n    noc_required_flag\
  \              STRING,\n    noc_available_flag             STRING,\n    fire_safety_flag\
  \               STRING,\n    health_safety_flag             STRING,\n    effective_start_date\
  \           DATE,\n    effective_end_date             DATE,\n    is_current    \
  \                 STRING,\n    created_date                   TIMESTAMP,\n    created_by\
  \                     STRING,\n    updated_date                   TIMESTAMP,\n \
  \   updated_by                     STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32,\
  \ citizen_school_id_pk))\nLOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_school/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

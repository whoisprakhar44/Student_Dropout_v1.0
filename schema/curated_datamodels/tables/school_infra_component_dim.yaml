  \ (bucket(32, school_infra_component_dim_id_pk))\nLOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_infra_component_dim/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

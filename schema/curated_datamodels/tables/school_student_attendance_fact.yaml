raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.school_student_attendance_fact\n\
  (\n    school_student_attendance_fact_id_pk   BIGINT,\n    citizen_student_id_fk\
  \                  BIGINT,\n    school_medium_id_fk                    BIGINT,\n\
  \    student_class_dim_id_fk                BIGINT,\n    student_school_id_fk  \
  \                 BIGINT,\n    academic_year                          STRING,\n\
  \    attendance_date_id_fk                  BIGINT,\n    present_flag          \
  \                 STRING,\n    absent_flag                            STRING,\n\
  \    half_day_flag                          STRING,\n    attendance_weight     \
  \                 DECIMAL(5,2),\n    attendance_status_code                 STRING,\n\
  \    attendance_reason_code                 STRING,\n    marked_by_role        \
  \                 STRING,\n    attendance_capture_method              STRING,\n\
  \    mdm_eligible_flag                      STRING,\n    meals_consumed_flag   \
  \                 STRING,\n    eggs_eligible_flag                     STRING,\n\
  \    chikki_eligible_flag                   STRING,\n    ragi_java_eligible_flag\
  \                STRING,\n    capture_source                         STRING,\n \
  \   hm_approval_flag                       STRING,\n    hm_approval_date       \
  \                DATE,\n    absence_reason_dim_id_fk               BIGINT,\n   \
  \ image_available_flag                   STRING,\n    latitude                 \
  \              DECIMAL(9,6),\n    longitude                              DECIMAL(9,6),\n\
  \    created_date                           TIMESTAMP,\n    created_by         \
  \                    STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, school_student_attendance_fact_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_student_attendance_fact/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

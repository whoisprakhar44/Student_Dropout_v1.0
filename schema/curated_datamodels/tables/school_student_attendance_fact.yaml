database: curated_datamodels
table: school_student_attendance_fact
description: Fact table for school student attendance measures and events.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_student_attendance_fact/
partitioned_by: bucket(32, school_student_attendance_fact_id_pk)
tblproperties:
  engine.hive.enabled: 'true'

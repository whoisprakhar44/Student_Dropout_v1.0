database: curated_datamodels
table: school_subject_master
description: Dimension/master table for school subject reference attributes.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/school_subject_master/
partitioned_by: bucket(32, subject_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.school_subject_master\n\
  (\n    subject_pk                   BIGINT,\n    subject_code                 STRING,\n\
  \    subject_name                 STRING,\n    subject_short_name           STRING,\n\
  \    subject_category             STRING,\n    subject_type                 STRING,\n\
  \    language_order               INT,\n    is_vocational_flag           STRING,\n\
  \    is_skill_subject_flag        STRING,\n    min_class                    INT,\n\
  \    max_class                    INT,\n    medium_id                    BIGINT,\n\
  \    is_compulsory_flag           STRING,\n    board_code                   STRING,\n\
  \    assessment_pattern           STRING,\n    marks_scheme                 STRING,\n\
  \    credit_weight                DECIMAL(5,2),\n    subject_status            \
  \   STRING,\n    grade_applicability_from     INT,\n    grade_applicability_to \
  \      INT,\n    effective_from               DATE,\n    effective_to          \
  \       DATE,\n    replaced_by_subject_pk       BIGINT,\n    created_date      \
  \           TIMESTAMP,\n    created_by                   STRING,\n    updated_date\
  \                 TIMESTAMP,\n    updated_by                   STRING\n)\nUSING\
  \ ICEBERG\nPARTITIONED BY (bucket(32, subject_pk))\nLOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/school_subject_master/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

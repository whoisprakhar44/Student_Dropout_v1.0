  \    is_current                  STRING,\n    is_active                   STRING,\n\
  \    created_date                TIMESTAMP,\n    created_by                  STRING,\n\
  \    updated_date                TIMESTAMP,\n    updated_by                  STRING\n\
  )\nUSING ICEBERG\nPARTITIONED BY (bucket(32, school_scheme_dim_id_pk))\nLOCATION\
  \ 'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/school_scheme_master/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

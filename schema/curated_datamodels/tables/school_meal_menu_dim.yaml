database: curated_datamodels
table: school_meal_menu_dim
description: Dimension/master table for school meal menu reference attributes.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_meal_menu_dim/
partitioned_by: bucket(32, school_meal_menu_dim_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.school_meal_menu_dim\n\
  (\n    school_meal_menu_dim_id_pk    BIGINT,\n    meal_type_dim_id_fk          \
  \ BIGINT,\n    nutrition_item_dim_id_fk      BIGINT,\n    weekday_code         \
  \        STRING,\n    academic_year                STRING,\n    is_planned     \
  \              STRING,\n    is_active                    STRING,\n    effective_start_date\
  \          DATE,\n    effective_end_date            DATE,\n    is_current      \
  \             STRING,\n    created_date                 TIMESTAMP,\n    created_by\
  \                   STRING,\n    updated_date                 TIMESTAMP,\n    updated_by\
  \                   STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, school_meal_menu_dim_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/school_meal_menu_dim/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.citizen_school_teacher\n\
  (\n    citizen_school_teacher_id_pk   BIGINT,\n    treasury_id                 \
  \   STRING,\n    cfms_id                        STRING,\n    national_teacher_code\
  \          STRING,\n    teacher_citizen_master_fk      BIGINT,\n    teacher_emp_id\
  \                 STRING,\n    teacher_name                   STRING,\n    gender\
  \                         STRING,\n    date_of_birth                  DATE,\n  \
  \  joining_date                   DATE,\n    qualification                  STRING,\n\
  \    employment_type                STRING,\n    teacher_designation           \
  \ STRING,\n    subject_specialization_key     BIGINT,\n    father_name         \
  \           STRING,\n    father_citizen_master_id       BIGINT,\n    mother_name\
  \                    STRING,\n    mother_citizen_master_id       BIGINT,\n    spouse_name\
  \                    STRING,\n    spouse_citizen_master_id       BIGINT,\n    caste_id_fk\
  \                    BIGINT,\n    is_single_parent               STRING,\n    disability_category\
  \            STRING,\n    academic_qualification         STRING,\n    professional_qualification\
  \     STRING,\n    tet_passed_flag                STRING,\n    tet_year_of_passing\
  \            INT,\n    service_status                 STRING,\n    date_of_first_appointment\
  \      DATE,\n    present_designation_teaching_type STRING,\n    effective_start_date\
  \           DATE,\n    effective_end_date             DATE,\n    is_current    \
  \                 STRING,\n    created_date                   TIMESTAMP,\n    created_by\
  \                     STRING,\n    updated_date                   TIMESTAMP,\n \
  \   updated_by                     STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32,\
  \ citizen_school_teacher_id_pk))\nLOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/canonicalmodel/citizen_school_teacher/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

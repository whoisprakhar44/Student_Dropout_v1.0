database: curated_datamodels
table: scheme_benefits_fact
description: Fact table for scheme benefits measures and events.
table_format: ICEBERG
location: hdfs://datalakedev/user/CURATED/curated_datamodels/school/scheme_benefits_fact/
partitioned_by: bucket(32, scheme_benefits_fact_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.scheme_benefits_fact\n\
  (\n    scheme_benefits_fact_id_pk      BIGINT,\n    citizen_school_id_fk       \
  \     BIGINT,\n    school_scheme_master_id_fk      BIGINT,\n    academic_year  \
  \                 STRING,\n    benefit_type_id_fk              BIGINT,\n    beneficiary_type_id_fk\
  \          BIGINT,\n    citizen_student_id_fk           BIGINT,\n    school_teacher_id_fk\
  \            BIGINT,\n    scheme_application_id           STRING,\n    social_category\
  \                 STRING,\n    eligible_flag                   STRING,\n    attendance_eligible_flag\
  \        STRING,\n    benefit_delivered_flag          STRING,\n    delivery_mode\
  \                   STRING,\n    sanction_order_number           STRING,\n    eligible_beneficiary_flag\
  \       STRING,\n    benefit_sanctioned_flag         STRING,\n    benefit_disbursed_flag\
  \          STRING,\n    scheme_benefits_factcol         STRING,\n    benefit_rejected_flag\
  \           STRING,\n    benefit_withheld_flag           STRING,\n    benefit_amount_sanctioned\
  \       DECIMAL(12,2),\n    benefit_amount_disbursed        DECIMAL(12,2),\n   \
  \ benefit_amount_pending          DECIMAL(12,2),\n    central_share_amount     \
  \       DECIMAL(12,2),\n    state_share_amount              DECIMAL(12,2),\n   \
  \ benefit_quantity                DECIMAL(10,2),\n    benefit_event_count      \
  \       INT,\n    benefit_amount                  DECIMAL(12,2),\n    beneficiary_count\
  \               INT,\n    application_date                DATE,\n    sanction_date\
  \                   DATE,\n    disbursement_date               DATE,\n    expected_disbursement_date\
  \      DATE,\n    delay_days                      INT,\n    rejection_reason_code\
  \           STRING,\n    payment_failure_reason_code     STRING,\n    aadhaar_seeded_flag\
  \             STRING,\n    bank_account_verified_flag      STRING,\n    kyc_completed_flag\
  \              STRING,\n    girl_child_flag                 STRING,\n    sc_st_minority_flag\
  \             STRING,\n    cwsn_flag                       STRING,\n    bgm_eligible_flag\
  \               STRING,\n    below_poverty_line_flag         STRING,\n    scheme_uptake_rate\
  \              DECIMAL(5,2),\n    created_date                    TIMESTAMP,\n \
  \   created_by                      STRING,\n    updated_date                  \
  \  TIMESTAMP,\n    updated_by                      STRING\n)\nUSING ICEBERG\nPARTITIONED\
  \ BY (bucket(32, scheme_benefits_fact_id_pk))\nLOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/scheme_benefits_fact/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

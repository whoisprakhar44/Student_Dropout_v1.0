partitioned_by: bucket(32, mid_day_meal_serving_fact_id_pk)
tblproperties:
  engine.hive.enabled: 'true'
  format-version: '2'
  write.format.default: parquet
  parquet.compression: SNAPPY
raw_ddl: "CREATE EXTERNAL TABLE IF NOT EXISTS curated_datamodels.mid_day_meal_serving_fact\n\
  (\n    mid_day_meal_serving_fact_id_pk   BIGINT,\n    citizen_school_id_fk     \
  \         BIGINT,\n    date_key_id_fk                    BIGINT,\n    meal_type_id_fk\
  \                   BIGINT,\n    nutrition_item_dim_key_fk         BIGINT,\n   \
  \ scheme_key_id_fk                  BIGINT,\n    academic_year                 \
  \    STRING,\n    mid_day_meal_serving_factor       DECIMAL(5,2),\n    vendor_id_fk\
  \                      BIGINT,\n    indent_reference_number           STRING,\n\
  \    inspection_reference_id           STRING,\n    students_enrolled_count    \
  \       INT,\n    students_present_count            INT,\n    students_served_count\
  \             INT,\n    students_not_served_count         INT,\n    students_eligible_count\
  \           INT,\n    meal_served_flag                  STRING,\n    menu_item_count\
  \                   INT,\n    calories_served                   DECIMAL(8,2),\n\
  \    protein_grams_served              DECIMAL(8,2),\n    egg_served_count     \
  \             INT,\n    milk_served_quantity_ml           INT,\n    meal_serving_start_time\
  \           TIMESTAMP,\n    mid_day_meal_serving_factcol2     STRING,\n    cooked_on_site_flag\
  \               STRING,\n    centralized_kitchen_flag          STRING,\n    fuel_type\
  \                         STRING,\n    hygiene_compliant_flag            STRING,\n\
  \    food_tasted_flag                  STRING,\n    teacher_supervised_flag    \
  \       STRING,\n    medical_incident_reported_flag    STRING,\n    last_inspection_date\
  \              DATE,\n    inspection_score                  DECIMAL(5,2),\n    inspection_remarks_code\
  \           STRING,\n    geo_tagged_flag                   STRING,\n    photo_captured_flag\
  \               STRING,\n    meal_not_served_reason_code       STRING,\n    supply_shortage_flag\
  \              STRING,\n    created_date                      TIMESTAMP,\n    created_by\
  \                        STRING\n)\nUSING ICEBERG\nPARTITIONED BY (bucket(32, mid_day_meal_serving_fact_id_pk))\n\
  LOCATION 'hdfs://datalakedev/user/CURATED/curated_datamodels/school/mid_day_meal_serving_fact/'\n\
  TBLPROPERTIES (\n    'engine.hive.enabled'='true',\n    'format-version'='2',\n\
  \    'write.format.default'='parquet',\n    'parquet.compression'='SNAPPY'\n);"

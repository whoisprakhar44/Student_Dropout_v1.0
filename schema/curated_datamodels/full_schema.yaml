  - name: is_skill_subject_flag
    type: STRING
    nullable: true
    description: Is skill subject flag.
  - name: min_class
    type: INT
    nullable: true
    description: Min class.
  - name: max_class
    type: INT
    nullable: true
    description: Max class.
  - name: medium_id
    type: BIGINT
    nullable: true
    description: Medium identifier.
  - name: is_compulsory_flag
    type: STRING
    nullable: true
    description: Is compulsory flag.
  - name: board_code
    type: STRING
    nullable: true
    description: Board code.
  - name: assessment_pattern
    type: STRING
    nullable: true
    description: Assessment pattern.
  - name: marks_scheme
    type: STRING
    nullable: true
    description: Marks scheme.
  - name: credit_weight
    type: DECIMAL(5,2)
    nullable: true
    description: Credit weight.
  - name: subject_status
    type: STRING
    nullable: true
    description: Subject status.
  - name: grade_applicability_from
    type: INT
    nullable: true
    description: Grade applicability from.
  - name: grade_applicability_to
    type: INT
    nullable: true
    description: Grade applicability to.
  - name: effective_from
    type: DATE
    nullable: true
    description: Effective from.
  - name: effective_to
    type: DATE
    nullable: true
    description: Effective to.
  - name: replaced_by_subject_pk
    type: BIGINT
    nullable: true
    description: Replaced by subject primary key.
  - name: created_date
    type: TIMESTAMP
    nullable: true
    description: Created date.
  - name: created_by
    type: STRING
    nullable: true
    description: Created by.
  - name: updated_date
    type: TIMESTAMP
    nullable: true
    description: Updated date.
  - name: updated_by
    type: STRING
    nullable: true
    description: Updated by.
  primary_key:
  - subject_pk
  - replaced_by_subject_pk
  relationships: []
  business_terms:
  - school analytics
  common_operations:
  - profile records in school_subject_master
  - join with related school and citizen dimensions

